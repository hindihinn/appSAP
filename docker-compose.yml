services:
  db:
    image: mysql:8.0
    container_name: appsap-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Itsapcpka25
      MYSQL_DATABASE: fleet_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Automatically import your database backup on first run
      - ./appSAP.sql:/docker-entrypoint-initdb.d/appSAP.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pItsapcpka25"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: appsap-api
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Itsapcpka25
      - DB_NAME=fleet_management
      - DB_PORT=3306
      - JWT_SECRET=fleet_management_secret_key_2026_sap
      - JWT_EXPIRES_IN=7d
      - PORT=5000
      - UPLOAD_DIR=./uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/usr/src/app/uploads

  web:
    build: ./web
    container_name: appsap-web
    restart: always
    environment:
      - VITE_API_URL=http://api:5000
    ports:
      - "5173:5173"
    depends_on:
      - api

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: appsap-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=Itsapcpka25
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  api_uploads:
